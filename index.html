<!DOCTYPE html>
<html>
<head>
    <title>Translate to Lucas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Translate to Lucas</h1>
<p>English → Lucas</p>

<div class="boxes">

<div class="box">
<h2>English</h2>
<textarea id="input" placeholder="Type something..."></textarea>
</div>

<div class="box">
<h2>Lucas</h2>
<div id="output">
Your translation will appear here.
</div>
</div>

</div>

<button onclick="translate()">Translate</button>

<br><br>

<button onclick='example("It's sunny out.")'>☀️ It's sunny out</button>
<button onclick='example("I hit my funny bone.")'>🦴 Funny bone</button>
<button onclick='example("That ball is bouncy.")'>🏀 Bouncy ball</button>

<script src="script.js"></script>

</body>
</html>
